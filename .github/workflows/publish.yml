# Secure publish to npm with Trusted Publishing (OIDC) + provenance.
#
# No token to leak: npm trusts THIS repo + workflow directly via OpenID Connect.
# Provenance is attached automatically, so npmjs.com shows a "Provenance" badge.
#
# One-time setup (on npmjs.com, done by the maintainer):
#   Package @luizporto/vigia > Settings > Trusted Publisher > GitHub Actions:
#     Organization/user:  luizporto-ai
#     Repository:         vigia
#     Workflow filename:  publish.yml
#   (leave Environment blank)
# After that, you can delete the NPM_TOKEN secret and revoke all publish tokens.
#
# To cut a release: bump "version" in package.json, commit, then publish a GitHub
# Release (Releases > Draft a new release > new tag like v0.2.0). This runs it.
name: publish

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # required for OIDC trusted publishing + provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - run: npm install -g npm@latest # trusted publishing needs npm >= 11.5.1
      - run: node --test
      - run: npm publish --provenance --access public
